<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Market Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e1117;--sf:#161b26;--sf2:#1e2535;--sf3:#252d3d;
  --b:rgba(255,255,255,0.07);--b2:rgba(255,255,255,0.14);
  --t:#e8eaf0;--t2:#8b92a5;--t3:#555e72;
  --red:#f04f4f;--rbg:rgba(240,79,79,0.12);--rdim:rgba(240,79,79,0.28);
  --amb:#f5a623;--abg:rgba(245,166,35,0.12);--adim:rgba(245,166,35,0.28);
  --grn:#3ecf8e;--gbg:rgba(62,207,142,0.12);--gdim:rgba(62,207,142,0.28);
  --blu:#5b9cf6;--bbg:rgba(91,156,246,0.12);
  --pur:#a78bfa;--pbg:rgba(167,139,250,0.12);
  --rsm:6px;--r:10px
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--t);min-height:100vh;font-size:14px}
*{scrollbar-width:thin;scrollbar-color:var(--sf3) transparent}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--sf3)}
.topbar{background:var(--sf);border-bottom:1px solid var(--b);height:52px;display:flex;align-items:center;padding:0 1.25rem;position:sticky;top:0;z-index:200;justify-content:space-between;gap:8px}
.logo{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:700;letter-spacing:-.02em;flex-shrink:0}
.logo-mark{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#5b9cf6,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--grn);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.nav-tabs{display:flex;gap:2px;flex:1}
.nav-tab{display:flex;align-items:center;gap:6px;padding:6px 13px;border-radius:var(--rsm);font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;border:none;background:none;transition:all .15s;white-space:nowrap}
.nav-tab:hover{color:var(--t);background:var(--sf2)}
.nav-tab.active{color:var(--t);background:var(--sf2)}
.nav-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;opacity:0}
.nav-tab.active .nav-dot{opacity:1}
.nd-bl{background:var(--blu)}.nd-am{background:var(--amb)}.nd-pu{background:var(--pur)}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.clock{font-size:12px;color:var(--t3);font-variant-numeric:tabular-nums}
.btn-s{display:flex;align-items:center;gap:5px;font-size:12px;padding:5px 11px;border-radius:var(--rsm);border:1px solid var(--b2);background:var(--sf2);color:var(--t2);cursor:pointer;transition:all .15s}
.btn-s:hover{background:var(--sf3);color:var(--t)}
.btn-s:disabled{opacity:.4;cursor:not-allowed}
.page{display:none;height:calc(100vh - 52px);overflow:hidden}
.page.active{display:flex}
.sidebar{width:400px;min-width:280px;border-right:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sb-bar{padding:10px 12px;border-bottom:1px solid var(--b);background:var(--sf);flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.sbox{display:flex;align-items:center;gap:8px;background:var(--sf2);border:1px solid var(--b);border-radius:var(--rsm);padding:6px 10px;transition:border-color .15s}
.sbox:focus-within{border-color:var(--blu)}
.sbox input{background:none;border:none;outline:none;color:var(--t);font-size:13px;flex:1}
.sbox input::placeholder{color:var(--t3)}
.frow{display:flex;gap:5px;flex-wrap:wrap}
.fb{font-size:11px;font-weight:600;padding:4px 12px;border-radius:99px;border:1px solid var(--b2);background:var(--sf2);color:var(--t2);cursor:pointer;transition:all .15s}
.fb:hover{background:var(--sf3);color:var(--t)}
.fb.aall{border-color:var(--blu);color:#fff;background:var(--blu)}
.fb.acritica{border-color:var(--red);color:#fff;background:var(--red)}
.fb.aimportante{border-color:var(--amb);color:#0e1117;background:var(--amb)}
.fb.anormal{border-color:var(--grn);color:#0e1117;background:var(--grn)}
.rbar{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--t3)}
.rb-p{flex:1;height:2px;background:var(--sf3);border-radius:1px;overflow:hidden}
.rb-f{height:100%;background:var(--blu);border-radius:1px;transition:width 1s linear}
.nlist{flex:1;overflow-y:auto;background:var(--bg)}
.sh{position:sticky;top:0;z-index:10;padding:5px 14px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.shc{background:rgba(14,17,23,.96);color:var(--red);border-bottom:1px solid rgba(240,79,79,.18)}
.shi{background:rgba(14,17,23,.96);color:var(--amb);border-bottom:1px solid rgba(245,166,35,.18)}
.shn{background:rgba(14,17,23,.96);color:var(--grn);border-bottom:1px solid rgba(62,207,142,.18)}
.sh-c{font-size:10px;font-weight:700;padding:1px 7px;border-radius:99px;margin-left:auto}
.sh-c.r{background:var(--rbg);color:var(--red)}.sh-c.a{background:var(--abg);color:var(--amb)}.sh-c.g{background:var(--gbg);color:var(--grn)}
.ni{padding:11px 14px;border-bottom:1px solid var(--b);cursor:pointer;transition:background .1s;border-left:3px solid transparent}
.ni:hover{background:var(--sf)}
.ni.active{background:var(--sf2)}
.ni.active.ic{border-left-color:var(--red)}.ni.active.ii{border-left-color:var(--amb)}.ni.active.in{border-left-color:var(--grn)}
.ni.read{opacity:.55}.ni.read:hover{opacity:.8}.ni.read .ni-tt{color:var(--t2);font-weight:400}
.ni-top{display:flex;align-items:flex-start;gap:7px;margin-bottom:5px}
.udot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px}
.udot.c{background:var(--red)}.udot.i{background:var(--amb)}.udot.n{background:var(--grn)}
.ni.read .udot{opacity:0}
.ni-bdg{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 6px;border-radius:3px;flex-shrink:0;margin-top:2px}
.bc{background:var(--rdim);color:var(--red)}.bi{background:var(--adim);color:var(--amb)}.bn{background:var(--gdim);color:var(--grn)}
.ni-tt{font-size:13px;font-weight:600;line-height:1.4;color:var(--t);flex:1}
.ni-ds{font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ni-mt{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.ni-tm,.ni-sc{font-size:11px;color:var(--t3)}
.ni-dt{width:2px;height:2px;border-radius:50%;background:var(--t3);flex-shrink:0}
.mt{font-size:10px;font-weight:600;padding:1px 6px;border-radius:3px}
.mt-sp500{background:rgba(91,156,246,.15);color:#7ab3f8}.mt-nasdaq{background:rgba(167,139,250,.15);color:#b39dfd}
.mt-dj{background:rgba(62,207,142,.15);color:#4dd4a0}.mt-oil{background:rgba(245,166,35,.15);color:#f7c060}
.mt-bonds{background:rgba(45,212,191,.15);color:#4de0cc}.mt-fx{background:rgba(240,79,79,.15);color:#f47070}
.mt-crypto{background:rgba(251,191,36,.15);color:#fbbf24}.mt-ibex{background:rgba(96,165,250,.15);color:#70a8fc}
.mt-global{background:rgba(139,146,165,.15);color:#8b92a5}.mt-eu{background:rgba(99,179,237,.15);color:#76c5ee}
.dp{flex:1;overflow-y:auto;background:var(--bg);display:flex;flex-direction:column}
.dp-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--t3);gap:12px;font-size:13px;text-align:center}
.dp-empty .big{font-size:40px;opacity:.15}
.dp-cnt{padding:2rem 2.5rem;max-width:780px}
.dc-top{display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
.dc-bdg{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:4px 12px;border-radius:4px}
.dc-bdg.c{background:var(--rbg);color:var(--red);border:1px solid rgba(240,79,79,.3)}
.dc-bdg.i{background:var(--abg);color:var(--amb);border:1px solid rgba(245,166,35,.3)}
.dc-bdg.n{background:var(--gbg);color:var(--grn);border:1px solid rgba(62,207,142,.3)}
.dc-mkts{display:flex;gap:6px;flex-wrap:wrap}
.dc-tt{font-size:22px;font-weight:800;line-height:1.25;color:var(--t);margin-bottom:.8rem;letter-spacing:-.025em}
.dc-ds{font-size:14px;color:var(--t2);line-height:1.7;margin-bottom:1.2rem;padding-bottom:1.2rem;border-bottom:1px solid var(--b);font-style:italic}
.dc-meta{display:flex;align-items:center;gap:16px;margin-bottom:1.4rem;padding-bottom:1rem;border-bottom:1px solid var(--b);flex-wrap:wrap}
.dc-mi{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t3)}
.dc-mi strong{color:var(--t2);font-weight:500}
.dc-body{font-size:14px;line-height:1.8;color:var(--t2)}
.dc-body p{margin-bottom:1rem}.dc-body p:last-child{margin-bottom:0}
.dc-ft{margin-top:2rem;padding-top:1.2rem;border-top:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.dc-src{font-size:12px;color:var(--t3)}
.dc-lnk{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--blu);text-decoration:none;padding:6px 14px;border-radius:var(--rsm);border:1px solid rgba(91,156,246,.25);background:var(--bbg)}
.dc-lnk:hover{background:rgba(91,156,246,.22)}
.cal-pg{flex:1;overflow-y:auto;padding:1.5rem}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;flex-wrap:wrap;gap:10px}
.cal-hdr h2{font-size:16px;font-weight:600}
.cal-flt{display:flex;gap:6px}
.cfb{font-size:11px;font-weight:600;padding:4px 12px;border-radius:99px;border:1px solid var(--b2);background:var(--sf2);color:var(--t2);cursor:pointer;transition:all .15s}
.cfb.active{background:var(--sf3);color:var(--t);border-color:var(--b2)}
.cfb.hi.active{border-color:var(--red);color:var(--red);background:var(--rbg)}
.cal-day{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);padding:12px 0 6px;border-bottom:1px solid var(--b);margin-bottom:8px}
.cal-ev{background:var(--sf);border:1px solid var(--b);border-radius:var(--r);margin-bottom:8px;overflow:hidden;transition:border-color .15s;cursor:pointer}
.cal-ev:hover{border-color:var(--b2)}
.cal-ev.ih{border-left:3px solid var(--red)}.cal-ev.im{border-left:3px solid var(--amb)}.cal-ev.il{border-left:3px solid var(--sf3)}
.ce-top{padding:.85rem 1.1rem;display:grid;grid-template-columns:80px 32px 1fr auto 24px;align-items:center;gap:12px}
.ce-tm{font-size:12px;color:var(--t2);font-variant-numeric:tabular-nums;font-weight:500}
.ce-fl{font-size:18px;text-align:center}
.ce-nm{font-size:13px;font-weight:600;color:var(--t);margin-bottom:2px}
.ce-ds{font-size:11px;color:var(--t3)}
.ce-dots{display:flex;gap:3px;margin-top:5px}
.ce-d{width:8px;height:8px;border-radius:2px;background:var(--sf3)}
.ce-d.h{background:var(--red)}.ce-d.m{background:var(--amb)}.ce-d.l{background:var(--grn)}
.ce-pv{text-align:right}
.ce-pvl{font-size:10px;color:var(--t3)}
.ce-pvv{font-size:12px;color:var(--t2);font-variant-numeric:tabular-nums;font-weight:600}
.ce-chv{font-size:16px;color:var(--t3);transition:transform .2s;text-align:center;user-select:none}
.cal-ev.open .ce-chv{transform:rotate(180deg)}
.ce-det{display:none;padding:0 1.1rem 1.1rem;border-top:1px solid var(--b)}
.cal-ev.open .ce-det{display:block}
.cd-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:1rem 0}
.cd-box{background:var(--sf2);border-radius:var(--rsm);padding:.75rem 1rem}
.cd-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);margin-bottom:4px}
.cd-val{font-size:16px;font-weight:700;color:var(--t)}
.cd-val.am{color:var(--amb)}
.cd-slbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);margin-bottom:6px}
.cd-an{font-size:13px;color:var(--t2);line-height:1.65;margin-bottom:1rem}
.cd-mkts{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.75rem}
.cd-mkt{font-size:11px;font-weight:600;padding:3px 9px;border-radius:3px;background:var(--sf3);color:var(--t2)}
.cd-warn{font-size:12px;color:var(--amb);background:var(--abg);border-radius:var(--rsm);padding:.6rem .9rem;margin-top:.5rem}
.gl-pg{flex:1;overflow-y:auto;padding:1.5rem}
.gl-hdr{display:flex;align-items:center;gap:8px;margin-bottom:1.2rem}
.gl-hdr h2{font-size:16px;font-weight:600}
.gl-cnt{font-size:12px;color:var(--t3)}
.gl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px}
.gc{background:var(--sf);border:1px solid var(--b);border-radius:var(--r);padding:1rem 1.1rem;transition:border-color .15s}
.gc:hover{border-color:var(--b2)}
.gc-term{font-size:14px;font-weight:700;color:var(--t);margin-bottom:5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.gc-cat{font-size:10px;font-weight:600;padding:2px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.04em}
.cat-f{background:var(--bbg);color:var(--blu)}.cat-a{background:var(--gbg);color:var(--grn)}
.cat-n{background:var(--pbg);color:var(--pur)}.cat-r{background:var(--rbg);color:var(--red)}
.cat-m{background:var(--abg);color:var(--amb)}.cat-e{background:rgba(45,212,191,.12);color:#4de0cc}
.gc-def{font-size:13px;color:var(--t2);line-height:1.6}
.gc-lvl{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:10px;color:var(--t3)}
.lvd{display:flex;gap:3px}
.ld{width:6px;height:6px;border-radius:50%;background:var(--sf3)}
.ld.on{background:var(--blu)}
.state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2rem;gap:14px;color:var(--t2);font-size:13px;text-align:center;flex:1}
.sp{width:20px;height:20px;border:2px solid var(--sf3);border-top-color:var(--blu);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning{animation:spin .7s linear infinite}
@media(max-width:700px){.sidebar{width:100%;border-right:none}.dp{display:none}.dp.show{display:flex;position:fixed;inset:0;z-index:300;overflow-y:auto;background:var(--bg)}}
</style>
</head>
<body>
 
<div class="topbar">
  <div class="logo"><div class="logo-mark">&#9650;</div>Market Dashboard<div class="live-dot"></div></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="goPage('news',this)"><span class="nav-dot nd-bl"></span>Noticias</button>
    <button class="nav-tab" onclick="goPage('cal',this)"><span class="nav-dot nd-am"></span>Calendario</button>
    <button class="nav-tab" onclick="goPage('gl',this)"><span class="nav-dot nd-pu"></span>Glosario</button>
  </div>
  <div class="topbar-right">
    <span class="clock" id="clock"></span>
    <button class="btn-s" id="ref-btn" onclick="loadNews()"><span id="ref-icon">&#8635;</span> Actualizar</button>
  </div>
</div>
 
<div class="page active" id="page-news">
  <div class="sidebar">
    <div class="sb-bar">
      <div class="sbox"><span style="color:var(--t3)">&#9906;</span><input id="sq" type="text" placeholder="Buscar noticia, fuente, mercado..." oninput="applyF()"/></div>
      <div class="frow">
        <button class="fb aall" onclick="setF(this,'all')">Todas</button>
        <button class="fb" onclick="setF(this,'c')"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#f04f4f;margin-right:4px;vertical-align:middle"></span>Critica</button>
        <button class="fb" onclick="setF(this,'i')"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#f5a623;margin-right:4px;vertical-align:middle"></span>Importante</button>
        <button class="fb" onclick="setF(this,'n')"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#3ecf8e;margin-right:4px;vertical-align:middle"></span>Comun</button>
      </div>
      <div class="rbar"><span>&#8635;</span><span id="nxt-ref">Actualizando en 5:00</span><div class="rb-p"><div class="rb-f" id="rb-f" style="width:100%"></div></div><span id="unread-lbl" style="color:var(--blu);font-weight:600;font-size:11px"></span></div>
    </div>
    <div class="nlist" id="nlist"><div class="state"><div class="sp"></div>Cargando noticias...</div></div>
  </div>
  <div class="dp" id="dp">
    <div class="dp-empty" id="dp-empty"><div class="big">&#9650;</div><span>Selecciona una noticia<br>para leer el contenido completo</span></div>
    <div class="dp-cnt" id="dp-cnt" style="display:none"></div>
  </div>
</div>
 
<div class="page" id="page-cal">
  <div class="cal-pg">
    <div class="cal-hdr"><h2>Calendario Economico</h2>
      <div class="cal-flt">
        <button class="cfb active" onclick="calFn('all',this)">Todos</button>
        <button class="cfb hi" onclick="calFn('h',this)">Alto impacto</button>
        <button class="cfb" onclick="calFn('m',this)">Medio</button>
      </div>
    </div>
    <div id="cal-cnt"></div>
  </div>
</div>
 
<div class="page" id="page-gl">
  <div class="gl-pg">
    <div class="gl-hdr"><h2>Glosario del Trader</h2><span class="gl-cnt" id="gl-cnt"></span></div>
    <div class="gl-grid" id="gl-grid"></div>
  </div>
</div>
 
<script>
function goPage(id,btn){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));document.getElementById('page-'+id).classList.add('active');btn.classList.add('active');}
function tickClock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
setInterval(tickClock,1000);tickClock();
 
const readSet=new Set(JSON.parse(localStorage.getItem('rn')||'[]'));
function saveR(){try{localStorage.setItem('rn',JSON.stringify([...readSet]));}catch(e){}}
function nk(n){return n.title.slice(0,60).toLowerCase().replace(/\s/g,'');}
const ML={'mt-sp500':'S&P 500','mt-nasdaq':'NASDAQ','mt-dj':'Dow Jones','mt-oil':'Petroleo','mt-bonds':'Bonos','mt-fx':'Forex','mt-crypto':'Crypto','mt-ibex':'IBEX 35','mt-global':'Global','mt-eu':'Europa'};
const CKW=['recession','recesion','crash','crisis','collapse','war','guerra','sanction','default','quiebra','federal reserve','reserva federal','bank failure','market crash','trump tariff','aranceles','systemic risk','debt ceiling','bailout','powell','geopolitical','iran','conflicto'];
const IKW=['gdp','pib','inflation','inflacion','unemployment','desempleo','interest rate','trade','tariff','arancel','earnings','beneficios','oil','petroleo','dollar','dolar','euro','yen','nasdaq','dow jones','s&p','ibex','opec','imf','deficit','deuda','crypto','bitcoin','semiconductor','apple','nvidia','microsoft','amazon','tesla','bce','ecb'];
const MR=[{tags:['mt-sp500','mt-nasdaq','mt-dj'],kw:['wall street','us stock','stock market']},{tags:['mt-sp500'],kw:['s&p 500','federal reserve','fed ','treasury','us economy','powell']},{tags:['mt-nasdaq'],kw:['nasdaq','apple','nvidia','microsoft','amazon','google','tesla','semiconductor','artificial intelligence']},{tags:['mt-dj'],kw:['dow jones']},{tags:['mt-oil'],kw:['oil','petroleo','crude','brent','wti','opec']},{tags:['mt-bonds'],kw:['bond','treasury','yield','rendimiento','interest rate']},{tags:['mt-fx'],kw:['dolar','dollar','euro','yen','forex','currency','divisa']},{tags:['mt-crypto'],kw:['bitcoin','crypto','ethereum','blockchain']},{tags:['mt-ibex'],kw:['ibex','espana','santander','bbva','telefonica','inditex']},{tags:['mt-eu'],kw:['europa','european','eurozona','ecb','bce','alemania','dax','ftse','lagarde']},{tags:['mt-global'],kw:['global','mundial','world','internacional','g7','g20','imf','war','guerra']}];
function classify(t){t=t.toLowerCase();for(const k of CKW)if(t.includes(k))return'c';for(const k of IKW)if(t.includes(k))return'i';return'n';}
function dmkts(t){t=t.toLowerCase();const f=new Set();for(const r of MR)if(r.kw.some(k=>t.includes(k)))r.tags.forEach(x=>f.add(x));if(!f.size)f.add('mt-global');return[...f].slice(0,4);}
function fdt(){const d=new Date();return{date:d.toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'}),time:d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})};}

async function loadNews(){
  const btn=document.getElementById('ref-btn'),icon=document.getElementById('ref-icon');
  btn.disabled=true;icon.classList.add('spinning');
  document.getElementById('dp-empty').style.display='flex';
  document.getElementById('dp-cnt').style.display='none';
  activeIdx=null;
  allNews=[];
  document.getElementById('nlist').innerHTML='<div class="state"><div class="sp"></div>Cargando noticias de '+RSS.length+' fuentes...</div>';
 
  const seen=new Set();
  let total=0;
 
  async function fetchOne(src){
    try{
      const url='https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(src.url)+'&api_key=public&count=15';
      const r=await fetch(url,{signal:AbortSignal.timeout(8000)});
      if(!r.ok)return[];
      const d=await r.json();
      if(d.status!=='ok'||!d.items?.length)return[];
      return d.items.filter(it=>it.title&&it.title.length>10).map(item=>{
        const txt=(item.title||'')+' '+(item.description||'');
        const raw=(item.description||'').replace(/<[^>]+>/g,' ').replace(/&amp;/g,'&').replace(/&nbsp;/g,' ').replace(/\s{2,}/g,' ').trim();
        const paras=raw.split(/(?<=[.!?])\s+/);
        const ps=[];let cur='';
        for(const s of paras){cur+=s+' ';if(cur.length>250){ps.push(cur.trim());cur='';}}
        if(cur.trim())ps.push(cur.trim());
        const body=ps.length?ps.map(p=>'<p>'+p+'</p>').join(''):'<p>Haz clic en "Ver noticia completa" para leer el articulo.</p>';
        const d2=new Date(item.pubDate||'');
        const dt={
          date:isNaN(d2)?'—':d2.toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'}),
          time:isNaN(d2)?'—':d2.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})
        };
        return{title:item.title.trim(),desc:raw.slice(0,180),body,source:src.name,link:item.link||'#',dt,imp:classify(txt),mkts:dmkts(txt)};
      });
    }catch(e){return[];}
  }
 
  // Cargar en lotes de 4, mostrar progresivamente
  for(let i=0;i<RSS.length;i+=4){
    const batch=RSS.slice(i,i+4);
    const results=await Promise.allSettled(batch.map(s=>fetchOne(s)));
    results.forEach(r=>{
      if(r.status!=='fulfilled')return;
      r.value.forEach(n=>{
        const k=n.title.slice(0,50).toLowerCase().replace(/\s/g,'');
        if(seen.has(k))return;
        seen.add(k);
        allNews.push(n);
        total++;
      });
    });
    if(total>0){
      allNews.sort((a,b)=>({'c':0,'i':1,'n':2}[a.imp]-{'c':0,'i':1,'n':2}[b.imp]));
      updU();renderList(allNews);
    } else {
      document.getElementById('nlist').innerHTML='<div class="state"><div class="sp"></div>Cargando... ('+Math.min(i+4,RSS.length)+'/'+RSS.length+' fuentes)</div>';
    }
  }
 
  if(total===0){
    document.getElementById('nlist').innerHTML='<div class="state" style="color:var(--t3)">No se pudieron cargar noticias.<br>Comprueba tu conexion a internet.</div>';
  }
  btn.disabled=false;icon.classList.remove('spinning');
  startCD();
}
function applyF(){if(!allNews||!allNews.length){renderList([]);return;}const q=document.getElementById('sq').value.toLowerCase();renderList(allNews.filter(n=>{const mf=activeF==='all'||n.imp===activeF;const ms=!q||n.title.toLowerCase().includes(q)||n.source.toLowerCase().includes(q)||n.mkts.some(m=>ML[m]&&ML[m].toLowerCase().includes(q));return mf&&ms;}));}
function setF(btn,f){activeF=f;document.querySelectorAll('.fb').forEach(b=>b.className='fb');btn.className='fb '+(f==='all'?'aall':f==='c'?'acritica':f==='i'?'aimportante':'anormal');applyF();}
 
function renderList(news){
  if(!news||!Array.isArray(news))news=[];
  const list=document.getElementById('nlist');
  if(!news.length){list.innerHTML='<div class="state" style="color:var(--t3)">Sin noticias para este filtro</div>';return;}
  const grp={c:[],i:[],n:[]};news.forEach(n=>grp[n.imp].push(n));
  const secs=[{k:'c',lbl:'Muy Importante',cls:'shc',cc:'r'},{k:'i',lbl:'Importante',cls:'shi',cc:'a'},{k:'n',lbl:'Comun',cls:'shn',cc:'g'}];
  let h='';
  secs.forEach(sec=>{
    const items=grp[sec.k];if(!items.length)return;
    h+='<div class="sh '+sec.cls+'">'+sec.lbl+'<span class="sh-c '+sec.cc+'">'+items.length+'</span></div>';
    items.forEach(n=>{
      const ri=allNews.indexOf(n);const isR=readSet.has(nk(n));
      const ia=ri===activeIdx?' active i'+n.imp:'';
      const bdg=n.imp==='c'?'bc':n.imp==='i'?'bi':'bn';
      const btxt=n.imp==='c'?'CRITICA':n.imp==='i'?'IMP.':'COMUN';
      const mts=n.mkts.map(m=>'<span class="mt '+m+'">'+(ML[m]||m)+'</span>').join(' ');
      h+='<div class="ni '+(isR?'read':'unread')+ia+'" onclick="selNews('+ri+')"><div class="ni-top"><span class="udot '+n.imp+'"></span><span class="ni-bdg '+bdg+'">'+btxt+'</span><span class="ni-tt">'+n.title+'</span></div>'+(n.desc?'<div class="ni-ds">'+n.desc+'</div>':'')+'<div class="ni-mt"><span class="ni-tm">'+n.dt.time+' &middot; '+n.dt.date+'</span><span class="ni-dt"></span><span class="ni-sc">'+n.source+'</span><span class="ni-dt"></span>'+mts+'</div></div>';
    });
  });
  list.innerHTML=h;
}
 
function selNews(idx){
  activeIdx=idx;const n=allNews[idx];if(!n)return;
  readSet.add(nk(n));saveR();updU();applyF();
  const mts=n.mkts.map(m=>'<span class="mt '+m+'" style="font-size:12px;padding:3px 10px">'+(ML[m]||m)+'</span>').join(' ');
  const itxt=n.imp==='c'?'Muy Importante':n.imp==='i'?'Importante':'Comun';
  document.getElementById('dp-empty').style.display='none';
  const dc=document.getElementById('dp-cnt');dc.style.display='block';
  dc.innerHTML='<div class="dc-top"><span class="dc-bdg '+n.imp+'">'+itxt+'</span><div class="dc-mkts">'+mts+'</div></div><h1 class="dc-tt">'+n.title+'</h1>'+(n.desc?'<div class="dc-ds">'+n.desc+'</div>':'')+'<div class="dc-meta"><div class="dc-mi"><strong>'+n.dt.date+'</strong></div><div class="dc-mi"><strong>'+n.dt.time+'</strong></div><div class="dc-mi"><strong>'+n.source+'</strong></div></div><div class="dc-body">'+n.body+'</div>'+(n.link&&n.link!=='#'?'<div class="dc-ft"><span class="dc-src">'+n.source+'</span><a class="dc-lnk" href="'+n.link+'" target="_blank" rel="noopener">&#8599; Ver noticia completa</a></div>':'');
  document.getElementById('dp').scrollTop=0;
}

function togCal(id){document.getElementById('cev-'+id).classList.toggle('open');}
function renderCal(){
  const evs=calFilter==='all'?CEVS:CEVS.filter(e=>e.imp===calFilter);
  const days=[...new Set(evs.map(e=>e.day))];
  let h='';
  days.forEach(day=>{
    const items=evs.filter(e=>e.day===day);
    h+='<div class="cal-day">'+day+'</div>';
    items.forEach((e,i)=>{
      const uid=day.replace(/\s/g,'')+i;
      const lvl=e.imp==='h'?3:e.imp==='m'?2:1;
      const dots=[0,1,2].map(j=>'<div class="ce-d'+(j<lvl?' '+e.imp:'')+'"></div>').join('');
      const mktT=(e.mkts||[]).map(m=>'<span class="cd-mkt">'+m+'</span>').join('');
      h+='<div class="cal-ev i'+e.imp+'" id="cev-'+uid+'" onclick="togCal(\''+uid+'\')"><div class="ce-top"><div class="ce-tm">'+e.time+'</div><div class="ce-fl">'+e.flag+'</div><div><div class="ce-nm">'+e.n+'</div><div class="ce-ds">'+e.d+'</div><div class="ce-dots">'+dots+'</div></div><div class="ce-pv"><div class="ce-pvl">Anterior</div><div class="ce-pvv">'+e.prev+'</div>'+(e.est!=='—'?'<div class="ce-pvl" style="margin-top:3px">Est.</div><div class="ce-pvv" style="color:var(--amb)">'+e.est+'</div>':'')+'</div><div class="ce-chv">&#8964;</div></div><div class="ce-det"><div class="cd-grid"><div class="cd-box"><div class="cd-lbl">Anterior</div><div class="cd-val">'+e.prev+'</div></div><div class="cd-box"><div class="cd-lbl">Estimado</div><div class="cd-val am">'+e.est+'</div></div><div class="cd-box"><div class="cd-lbl">Impacto</div><div class="cd-val" style="font-size:13px">'+(e.imp==='h'?'Alto':e.imp==='m'?'Medio':'Bajo')+'</div></div></div><div class="cd-slbl">Analisis</div><div class="cd-an">'+e.an+'</div><div class="cd-slbl">Mercados afectados</div><div class="cd-mkts">'+mktT+'</div>'+(e.av?'<div class="cd-warn">&#9888; '+e.av+'</div>':'')+'</div></div>';

  {t:'Cobertura (Hedge)',c:'r',d:'Estrategia para reducir riesgo usando un activo que se mueve en direccion opuesta a tu posicion.'},
  {t:'Market Maker',c:'n',d:'Entidad que provee liquidez cotizando precios de compra y venta continuamente. Gana el spread.'},
];
const CATS={f:'cat-f',a:'cat-a',n:'cat-n',r:'cat-r',m:'cat-m',e:'cat-e'};
const CNMS={f:'futuros',a:'acciones',n:'analisis',r:'riesgo',m:'macro',e:'etf'};
function renderGL(){
  document.getElementById('gl-cnt').textContent=GL.length+' terminos';
  document.getElementById('gl-grid').innerHTML=GL.map((g,i)=>{
    const lvl=Math.min(7,Math.floor(i/7)+1);
    const dots=[1,2,3,4,5,6,7].map(d=>'<span class="ld'+(d<=lvl?' on':'')+'"></span>').join('');
    const ltxt=lvl<=2?'Basico':lvl<=4?'Intermedio':lvl<=6?'Avanzado':'Experto';
    return '<div class="gc"><div class="gc-term">'+g.t+'<span class="gc-cat '+(CATS[g.c]||'cat-n')+'">'+( CNMS[g.c]||g.c)+'</span></div><div class="gc-def">'+g.d+'</div><div class="gc-lvl"><div class="lvd">'+dots+'</div><span>'+ltxt+'</span></div></div>';
  }).join('');
}
renderGL();
loadNews();
</script>
</body>
</html>
